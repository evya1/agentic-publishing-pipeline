name: CI Core

# ON HOLD — re-enable pull_request / push triggers once CI is stable on a clean checkout.
# Failing because uv.lock / Python env setup needs to be confirmed on the runner first.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Lint, test, and smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@bd01c18f51b31efa0756dc3e1631f943d53bdbbf  # v5.4.1

      - name: Frozen dependency sync
        run: uv sync --frozen --group dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Tests with coverage gate
        run: uv run pytest --cov=src --cov-report=term-missing --cov-fail-under=85

      - name: Production line-cap gate
        run: uv run python scripts/check_line_cap.py --limit 150 src

      - name: Build (wheel + sdist)
        run: uv build

      - name: Dry-run smoke (no network, no LLM)
        run: |
          export MPLCONFIGDIR="$(mktemp -d)"
          DRY_ROOT="$(mktemp -d)"
          uv run python -m agentic_publishing_pipeline \
            --mode dry-run \
            --results-root "$DRY_ROOT"

      - name: Offline-fixture smoke (no network, no LLM)
        run: |
          export MPLCONFIGDIR="$(mktemp -d)"
          OFFLINE_ROOT="$(mktemp -d)"
          uv run python -m agentic_publishing_pipeline \
            --mode offline-fixture \
            --topic "Reasoning-Centric Agentic LLM Systems" \
            --manifest config/article_sources.yaml \
            --registry config/prompt_registry \
            --results-root "$OFFLINE_ROOT"

      - name: Verify clean worktree after CI
        run: |
          git diff --check
          test -z "$(git status --porcelain)"
