name: Artifact Pipeline (Phases 8–14)

# This workflow provides permanent CI integration points for Phases 8–14.
# Each job is active only when its implementation is present.
# Jobs report "not yet implemented" and pass when their phase is pending.

# ON HOLD — Phases 8–14 are not yet implemented. Re-enable pull_request / push
# triggers as each phase lands so CI can gate on them incrementally.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Phase 8: graph validation ───────────────────────────────────────────────
  graph-validation:
    name: "Phase 8 — Graph validation and deterministic rendering"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@bd01c18f51b31efa0756dc3e1631f943d53bdbbf  # v5.4.1
      - name: Frozen dependency sync
        run: uv sync --frozen --group dev
      - name: Graph validation (active when visualization/ is implemented)
        run: |
          if python -c "from agentic_publishing_pipeline.visualization import graph; print(graph)" 2>/dev/null; then
            export MPLCONFIGDIR="$(mktemp -d)"
            uv run pytest tests/visualization/ -v --no-header -q
          else
            echo "SKIP: Phase 8 graph module not yet importable — marking pass."
          fi
      - name: Upload graph artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: graph-failure-artifacts
          path: |
            latex_project/figures/
            tests/visualization/
          retention-days: 7

  # ── Phase 9: LaTeX project structure ───────────────────────────────────────
  latex-structure:
    name: "Phase 9 — LaTeX project-structure validation"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: LaTeX project structure check
        run: |
          REQUIRED_FILES=(
            "latex_project/main.tex"
            "latex_project/preamble.tex"
            "latex_project/macros.tex"
            "latex_project/references.bib"
          )
          MISSING=()
          for f in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$f" ]; then
              MISSING+=("$f")
            fi
          done
          if [ "${#MISSING[@]}" -gt 0 ]; then
            echo "SKIP: Phase 9 LaTeX files not yet present — marking pass."
            for f in "${MISSING[@]}"; do echo "  missing: $f"; done
          else
            echo "OK: LaTeX project structure present."
            # Verify main.tex is a thin root (no long inline content)
            python scripts/check_latex_structure.py
          fi

  # ── Phase 10: LuaLaTeX PDF build ───────────────────────────────────────────
  pdf-build:
    name: "Phase 10 — LuaLaTeX/Biber PDF build"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Check if PDF build is ready
        id: check-ready
        run: |
          if [ -f "latex_project/main.tex" ] && [ -f "latex_project/preamble.tex" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install LuaLaTeX (when ready)
        if: steps.check-ready.outputs.ready == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y texlive-luatex texlive-bibtex-extra \
            texlive-lang-other texlive-fonts-recommended biber
      - name: Build PDF
        if: steps.check-ready.outputs.ready == 'true'
        run: |
          cd latex_project
          lualatex -interaction=nonstopmode main.tex
          biber main
          lualatex -interaction=nonstopmode main.tex
          lualatex -interaction=nonstopmode main.tex
          [ -f main.pdf ] && echo "OK: PDF produced." || (echo "FAIL: PDF not produced." && exit 1)
      - name: Skip (Phase 10 not yet ready)
        if: steps.check-ready.outputs.ready == 'false'
        run: |
          echo "SKIP: Phase 10 LaTeX project not yet ready - marking pass."
      - name: Upload PDF and logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: latex-build-logs
          path: |
            latex_project/main.log
            latex_project/main.pdf
          retention-days: 7

  # ── Phase 11: final deterministic validator ─────────────────────────────────
  final-validator:
    name: "Phase 11 — Final deterministic validator"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@bd01c18f51b31efa0756dc3e1631f943d53bdbbf  # v5.4.1
      - name: Frozen dependency sync
        run: uv sync --frozen --group dev
      - name: Run ValidatorService (when implemented)
        run: |
          if python -c "from agentic_publishing_pipeline.validation import ValidatorService" 2>/dev/null; then
            uv run pytest tests/ -k "validator" -v --no-header -q
          else
            echo "SKIP: ValidatorService (Phase 11) not yet implemented — marking pass."
          fi
      - name: Upload validator report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: validator-report
          path: validation_report.*
          retention-days: 7
