name: Security

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * 1"  # Weekly on Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── dependency-review ───────────────────────────────────────────────────────
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/dependency-review-action@da24cf84feea81745c9c94c3c6c498869b06e2e1  # v4.7.1
        with:
          fail-on-severity: high

  # ── codeql ─────────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL (Python)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: github/codeql-action/init@ce28f5bb42b1c7b34b59701ddbd1a72e25b53f3c  # v3.29.0
        with:
          languages: python
      - uses: github/codeql-action/autobuild@ce28f5bb42b1c7b34b59701ddbd1a72e25b53f3c  # v3.29.0
      - uses: github/codeql-action/analyze@ce28f5bb42b1c7b34b59701ddbd1a72e25b53f3c  # v3.29.0

  # ── repo-policy ─────────────────────────────────────────────────────────────
  repo-policy:
    name: Local repository policy checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: No tracked .env or secrets
        run: python scripts/check_no_secrets.py
      - name: No tracked source archives
        run: python scripts/check_source_archives.py
      - name: Check workflow permissions are minimal
        run: python scripts/check_workflow_permissions.py

  # ── workflow-lint ───────────────────────────────────────────────────────────
  workflow-lint:
    name: Workflow linting (actionlint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Install actionlint
        run: |
          ACTIONLINT_VERSION="1.7.7"
          curl -sSL \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            | tar -xz actionlint
          sudo mv actionlint /usr/local/bin/actionlint
      - name: Run actionlint
        run: actionlint -color .github/workflows/*.yml
