schema_version: v1
metadata:
  title: Reasoning-Centric Agentic LLM Systems
  subtitle: Planning, Memory, Retrieval, Tool Use, and Multimodal Reasoning
  authors:
    - evya1
  group_code: "evya1"
  course: 203.3763 — Orchestration of AI Agents
  date_text: "2026"
source:
  markdown_root: results/generated_markdown
  review_log_root: results/run_logs
  bibliography_path: latex_project/references.bib
  graph_path: latex_project/figures/planning_benchmark_comparison_02e65860.png
  outline_path: results/generated_markdown/outline.md
chapter_order:
  - introduction
  - planning
  - memory
  - retrieval
  - tool_use
  - multimodal
  - evaluation
  - conclusion
minimum_hebrew_words: 40
minimum_words_per_chapter: 400
minimum_total_words: 5000
require_all_bibliography_entries: true
chapter_citation_requirements:
  evaluation:
    - ye2024mirai
macros:
  - AgentState
  - ToolCall
  - MemoryStore
  - RetrievalScore
nomenclature:
  - [LLM, Large language model]
  - [RAG, Retrieval-augmented generation]
  - [MCP, Model Context Protocol]
english_index:
  - term: agentic reasoning
    chapter_id: introduction
  - term: planning
    chapter_id: planning
  - term: retrieval
    chapter_id: retrieval
  - term: tool use
    chapter_id: tool_use
  - term: evaluation
    chapter_id: evaluation
hebrew_index:
  - term: זיכרון
    chapter_id: memory
  - term: סוכנים
    chapter_id: memory
assets:
  - kind: image
    asset_id: planning_benchmark_graph
    chapter_id: planning
    caption: Deterministic planning benchmark comparison generated by the Phase 8 graph pipeline.
    label: planning-benchmark
    payload:
      width: 0.92
  - kind: table
    asset_id: evaluation_dimension_table
    chapter_id: evaluation
    caption: Evaluation dimensions for reasoning-centric agent systems.
    label: evaluation-dimensions
    payload:
      columns: [Dimension, Operational question, Evidence]
      rows:
        - [Correctness, "Did the system satisfy the task contract?", Validator report]
        - [Traceability, "Can each decision be reconstructed?", Run manifest]
        - [Robustness, "How are failures handled?", Controlled retry trace]
  - kind: equation
    asset_id: retrieval_score_equation
    chapter_id: retrieval
    caption: Cosine retrieval score.
    label: retrieval-score
    payload:
      template: retrieval-score
  - kind: equation_ref
    asset_id: retrieval_score_reference
    chapter_id: tool_use
    caption: ""
    label: retrieval-score-reference
    payload:
      target: retrieval-score
      sentence: "[EQUATION] is reused when a tool policy ranks evidence before acting."
  - kind: theorem
    asset_id: agent_state_definition
    chapter_id: memory
    caption: ""
    label: agent-state
    payload:
      kind: definition
      title: Agent state
      statement: An agent state is the validated information required to resume a bounded workflow without reconstructing hidden model context.
  - kind: tikz
    asset_id: retrieval_control_loop
    chapter_id: retrieval
    caption: A deterministic retrieve, reason, validate control loop.
    label: retrieval-loop
    payload:
      nodes:
        - {id: retrieve, label: Retrieve}
        - {id: reason, label: Reason}
        - {id: validate, label: Validate}
      edges:
        - [retrieve, reason]
        - [reason, validate]
