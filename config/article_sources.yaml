# Tracked source manifest for the agentic-publishing-pipeline article.
#
# Owned by the Bibliography Agent (see docs/PRD_crewai_pipeline.md §5 and
# docs/PRD_bibliography_and_citations.md §5). One entry per real source.
# Fabricated sources are forbidden at every stage (docs/PRD.md content
# policy, CLAUDE.md, PRD_bibliography_and_citations.md §7).
#
# Citation keys follow the `authorYYYYkey` convention:
#   - lowercase, ASCII only;
#   - `author` = surname of the first author (no diacritics);
#   - `YYYY`   = four-digit publication year;
#   - `key`    = short slug disambiguating the work;
#   - disambiguation suffixes `a`, `b`, ... when author + year collide.
# See docs/PRD_bibliography_and_citations.md §9 for the full rule.
#
# The downloaded archive bytes live under
# `data/sources/arxiv/source_zips/` (gitignored). Only this manifest is
# tracked. Each entry's `source_archive` field is a repo-relative path
# to the local file the developer dropped into that directory.
#
# Status: Phase 1.5 demo topic + source manifest lock.
#   - The 10 arXiv sources below correspond to the canonical demo
#     article topic locked in `docs/PRD.md` §22.
#   - The arXiv archive bytes have been placed under
#     `data/sources/arxiv/source_zips/` locally and are gitignored.
#   - Citation keys are **provisional** (`tbd…` prefix) because the
#     authoritative first-author surnames have not been confirmed yet.
#     The Bibliography Agent rekeys these in Phase 7 of `docs/PLAN.md`.
#   - `authors:` lists are empty placeholders. Populating them is a
#     follow-up tracked in `docs/TODO.md` §B.5 and §C.5; no fabricated
#     authors.
#   - Every entry's `verification.status` starts as `unverified`. The
#     Bibliography Agent performs URL/DOI verification in Phase 7 and
#     updates `verification.status` / `verified_at` / `verified_by`.

# ---------------------------------------------------------------------------
# Schema (informal — enforced later by the Bibliography Agent / ValidatorService)
# ---------------------------------------------------------------------------
#
# sources:
#   - citation_key: <authorYYYYkey>          # required, unique
#     title: "<paper title>"                  # required
#     authors:                                # required, ordered (may be []
#       - "<Surname, Given>"                  #   until authors are confirmed)
#     year: <YYYY>                            # required
#     arxiv_id: "<arxiv id, e.g. 1706.03762>" # required for arXiv sources
#     arxiv_url: "<https://arxiv.org/abs/...>"# required for arXiv sources
#     doi: "<doi>"                            # optional
#     source_archive: data/sources/arxiv/source_zips/<file>   # required if archive is local
#     intended_use: "<one-line freeform>"     # required; how this source maps
#                                             #   to the demo article (per PRD §22)
#     verification:
#       status: unverified | pending | verified | rejected    # required
#       method: arxiv_url | doi | catalog                     # planned or actual
#       verified_at: "<ISO 8601 timestamp or null>"
#       verified_by: "<run id or reviewer name, or null>"
#     notes: "<freeform>"                     # optional

